<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>반수생 멘탈 관리 대시보드</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: rgba(28, 28, 30, 0.7);
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --accent: #0a84ff;
            --danger: #ff453a;
            --success: #30d158;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px 40px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            backdrop-filter: blur(20px);
            -webkit-font-smoothing: antialiased;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .goal-section { display: flex; flex-direction: column; gap: 16px; width: 70%; }
        .goal-title {
            font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin: 0;
            line-height: 1.3; word-break: keep-all; min-height: 70px;
            background: linear-gradient(135deg, #fff, #a1a1a6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center;
        }

        .univ-images { display: flex; gap: 20px; }
        .univ-box {
            width: 120px; height: 120px; background-color: #2c2c2e; border-radius: 16px;
            display: flex; align-items: flex-end; justify-content: center;
            font-size: 15px; font-weight: 800; color: #ffffff; padding-bottom: 12px;
            box-sizing: border-box; text-shadow: 0 2px 5px rgba(0,0,0,0.9);
            border: 1px dashed rgba(255,255,255,0.4); background-size: cover;
            background-position: center; background-repeat: no-repeat;
            box-shadow: inset 0 -40px 40px -10px rgba(0,0,0,0.7);
            cursor: pointer; transition: transform 0.1s, border 0.2s;
        }
        .univ-box:hover { transform: scale(1.05); border: 1px solid rgba(255,255,255,0.8); }

        .dday-section { text-align: right; display: flex; flex-direction: column; gap: 12px; }
        .dday-item { font-size: 28px; font-weight: 700; color: var(--danger); background: var(--panel-bg); padding: 12px 24px; border-radius: 16px; border: 1px solid rgba(255, 69, 58, 0.3); }
        .dday-item.sub { font-size: 22px; color: #ff9f0a; border: 1px solid rgba(255, 159, 10, 0.3); }

        /* Main Content */
        .main-container { display: flex; flex: 1; gap: 24px; margin-bottom: 24px; overflow: hidden; }

        /* Todo Section */
        .todo-section { flex: 1; overflow-y: auto; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 20px; font-weight: 600; color: var(--text-sub); margin: 0; }
        
        .calendar-btn {
            background: rgba(10, 132, 255, 0.2); color: var(--accent);
            border: 1px solid var(--accent); padding: 6px 12px; border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }

        .todo-progress {
            font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 16px;
            padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; text-align: center;
        }

        .todo-input-group { display: flex; gap: 10px; margin-bottom: 16px; }
        .todo-input {
            flex: 1; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 10px;
            padding: 12px; color: #fff; font-size: 16px;
        }
        .todo-input:focus { outline: none; border-color: var(--accent); }
        .add-todo-btn {
            background: var(--accent); color: #fff; border: none; padding: 0 20px;
            border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        .todo-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .todo-item {
            display: flex; align-items: center; background: #1c1c1e; padding: 12px 16px;
            border-radius: 12px; gap: 12px;
        }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-sub); }
        .todo-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: var(--success); }
        .todo-text { flex: 1; font-size: 17px; font-weight: 500; word-break: break-all; transition: 0.2s; }
        .todo-action-btn { background: none; border: none; color: var(--text-sub); font-size: 14px; cursor: pointer; }

        /* Mental Care */
        .mental-section { width: 280px; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; }
        .mental-btn {
            background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px; border-radius: 16px; font-size: 22px; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .mental-btn:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.98); }

        /* Grass Tracker */
        .grass-section { height: 120px; }
        .grass-grid { display: flex; gap: 6px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; }
        .grass-cell { width: 24px; height: 24px; border-radius: 6px; background-color: #2c2c2e; flex-shrink: 0; }
        .grass-cell.active { background-color: var(--success); box-shadow: 0 0 8px rgba(48, 209, 88, 0.4); }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { width: 80%; max-width: 800px; text-align: center; }
        .modal-text { font-size: 42px; font-weight: 800; line-height: 1.5; color: #fff; word-break: keep-all; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }

        /* Calendar Modal */
        .calendar-content {
            background: #1c1c1e; width: 90%; max-width: 800px; padding: 24px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: left;
        }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-nav { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .cal-title { font-size: 24px; font-weight: 700; color: #fff; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-day-name { text-align: center; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
        .cal-cell {
            background: #2c2c2e; border-radius: 10px; min-height: 80px; padding: 8px;
            cursor: pointer; border: 1px solid transparent; display: flex; flex-direction: column; gap: 4px;
        }
        .cal-cell:hover { border-color: rgba(255,255,255,0.3); }
        .cal-date { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .cal-event {
            font-size: 11px; background: rgba(10, 132, 255, 0.3); color: #fff;
            padding: 2px 4px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .cal-close-btn { width: 100%; padding: 14px; margin-top: 20px; border-radius: 12px; background: #3a3a3c; color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }
    </style>
</head>

                    <div class="univ-box" id="univ-3" onclick="triggerImageUpload('univ-3')">동의대 한의대 +</div>
                </div>
            </div>
        </div>
        <div class="dday-section">
            <div class="dday-item" id="dday-suneung">수능 D-??</div>
            <div class="dday-item sub" id="dday-9">9평 D-??</div>
        </div>
    </div>

    <div class="main-container">
        <div class="todo-section panel">
            <div class="section-header">
                <h2 class="section-title">오늘의 미션</h2>
                <button class="calendar-btn" onclick="openCalendar()">📅 달력 보기</button>
            </div>
            
            <div class="todo-progress" id="todo-progress-text">의치한까지 0%</div>

            <div class="todo-input-group">
                <input type="text" class="todo-input" id="new-todo" placeholder="오늘 반드시 끝낼 일을 입력하세요" onkeypress="if(event.key==='Enter') addTodo()">
                <button class="add-todo-btn" onclick="addTodo()">추가</button>
            </div>

            <ul class="todo-list" id="todo-list"></ul>
        </div>

        <div class="mental-section panel">
            <h2 class="section-title" style="text-align: center;">긴급 멘탈 케어</h2>
            <button class="mental-btn" onclick="showMentalModal('피곤함')">피곤함 😵‍💫</button>
            <button class="mental-btn" onclick="showMentalModal('귀찮음')">귀찮음 🥱</button>
            <button class="mental-btn" onclick="showMentalModal('무기력함')">무기력함 🫠</button>
        </div>
    </div>

    <div class="grass-section panel">
        <h2 class="section-title">최근 30일 출석 기록</h2>
        <div class="grass-grid" id="grass-grid"></div>
    </div>

    <div class="modal-overlay" id="mental-modal" onclick="closeMentalModal()">
        <div class="modal-content">
            <div class="modal-text" id="mental-modal-msg"></div>
        </div>
    </div>

    <div class="modal-overlay" id="calendar-modal">
        <div class="calendar-content">
            <div class="cal-header">
                <button class="cal-nav" onclick="changeMonth(-1)">◀</button>
                <div class="cal-title" id="cal-title"></div>
                <button class="cal-nav" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <button class="cal-close-btn" onclick="closeCalendar()">닫기</button>
        </div>
    </div>

        function rotateQuote() {
            const quoteDisplay = document.getElementById('quote-display');
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteDisplay.style.opacity = 0; 
            setTimeout(() => {
                quoteDisplay.innerText = quotes[randomIndex];
                quoteDisplay.style.opacity = 1; 
            }, 300);
        }
        
        document.getElementById('quote-display').style.transition = "opacity 0.3s ease";

        /* --- 1. Image Upload (글씨 숨기기 적용) --- */
        let currentUploadTarget = null;
        function triggerImageUpload(boxId) { currentUploadTarget = boxId; document.getElementById('image-uploader').click(); }
        document.getElementById('image-uploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result;
                const box = document.getElementById(currentUploadTarget);
                box.style.backgroundImage = `url(${base64Image})`;
                box.innerText = ""; 
                box.style.boxShadow = "none"; 
                localStorage.setItem('img_' + currentUploadTarget, base64Image);
            };
            reader.readAsDataURL(file);
        });
        
        function loadImages() {
            ['univ-1', 'univ-2', 'univ-3'].forEach(id => {
                const savedImage = localStorage.getItem('img_' + id);
                if (savedImage) {
                    const box = document.getElementById(id);
                    box.style.backgroundImage = `url(${savedImage})`;
                    box.innerText = ""; 
                    box.style.boxShadow = "none";
                }
            });
        }

        /* --- 2. D-Day --- */
        function calculateDDay() {
            const today = new Date(); today.setHours(0,0,0,0);
            const suneung = new Date('2026-11-19T00:00:00');
            const sepMock = new Date('2026-09-02T00:00:00');
            const diffSuneung = Math.ceil((suneung - today) / (1000 * 60 * 60 * 24));
            const diffSepMock = Math.ceil((sepMock - today) / (1000 * 60 * 60 * 24));
            document.getElementById('dday-suneung').innerText = `수능 D-${diffSuneung > 0 ? diffSuneung : (diffSuneung === 0 ? 'Day' : '+' + Math.abs(diffSuneung))}`;
            document.getElementById('dday-9').innerText = `9평 D-${diffSepMock > 0 ? diffSepMock : (diffSepMock === 0 ? 'Day' : '+' + Math.abs(diffSepMock))}`;
        }

        /* --- 3. Todo List --- */
        let todos = [];
        const todayStr = new Date().toISOString().split('T')[0];
        
        function loadTodos() {
            todos = JSON.parse(localStorage.getItem('todos_' + todayStr)) || [];
            renderTodos();
        }
        function saveTodos() {
            localStorage.setItem('todos_' + todayStr, JSON.stringify(todos));
            renderTodos();
        }

        function renderTodos() {
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            let completedCount = 0;

            todos.forEach((todo, index) => {
                if(todo.completed) completedCount++;
                const li = document.createElement('li');
                li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                li.innerHTML = `
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${index})">
                    <span class="todo-text">${todo.text}</span>
                    <button class="todo-action-btn" onclick="editTodo(${index})">수정</button>
                    <button class="todo-action-btn" onclick="deleteTodo(${index})">삭제</button>
                `;
                list.appendChild(li);
            });

            const progressEl = document.getElementById('todo-progress-text');
            if (todos.length === 0) {
                progressEl.innerText = "오늘 할 일을 추가해라.";
                progressEl.style.color = "#8e8e93";
            } else {
                const percent = Math.round((completedCount / todos.length) * 100);
                if (percent === 100) {
                    progressEl.innerText = "의치한까지 100% - 내일도 존나 열심히 달려보자🔥";
                    progressEl.style.color = "var(--success)";
                } else {
                    progressEl.innerText = `의치한까지 ${percent}%`;
                    progressEl.style.color = "#fff";
                }
            }
        }

        function addTodo() {
            const input = document.getElementById('new-todo');
            const text = input.value.trim();
            if(text) {
                todos.push({ text: text, completed: false });
                input.value = '';
                saveTodos();
            }
        }
        function toggleTodo(index) { todos[index].completed = !todos[index].completed; saveTodos(); }
        function deleteTodo(index) { if(confirm('이 할 일을 삭제하시겠습니까?')) { todos.splice(index, 1); saveTodos(); } }
        function editTodo(index) {
            const newText = prompt('할 일을 수정하세요:', todos[index].text);
            if(newText !== null && newText.trim() !== '') { todos[index].text = newText.trim(); saveTodos(); }
        }

        /* --- 4. Calendar --- */
        let calDate = new Date();
        let events = JSON.parse(localStorage.getItem('calEvents')) || {};

        function saveEvents() { localStorage.setItem('calEvents', JSON.stringify(events)); }

        function openCalendar() { document.getElementById('calendar-modal').classList.add('show'); renderCalendar(); }
        function closeCalendar() { document.getElementById('calendar-modal').classList.remove('show'); }
        
        function changeMonth(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }

        function renderCalendar() {
            const year = calDate.getFullYear();
            const month = calDate.getMonth();
            document.getElementById('cal-title').innerText = `${year}년 ${month + 1}월`;

            const grid = document.getElementById('cal-grid');
            grid.innerHTML = '';
            
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            days.forEach(d => {
                const div = document.createElement('div');
                div.className = 'cal-day-name'; div.innerText = d; grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<firstDay; i++) {
                const empty = document.createElement('div'); grid.appendChild(empty);
            }

            for(let i=1; i<=lastDate; i++) {
                const cell = document.createElement('div');
                cell.className = 'cal-cell';
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                
                cell.innerHTML = `<div class="cal-date">${i}</div>`;
                
                if(events[dateKey]) {
                    events[dateKey].forEach((ev, idx) => {
                        const evDiv = document.createElement('div');
                        evDiv.className = 'cal-event'; evDiv.innerText = ev;
                        evDiv.onclick = (e) => {
                            e.stopPropagation();
                            if(confirm(`'${ev}' 일정을 삭제하시겠습니까?`)) {
                                events[dateKey].splice(idx, 1);
                                if(events[dateKey].length === 0) delete events[dateKey];
                                saveEvents(); renderCalendar();
                            }
                        };
                        cell.appendChild(evDiv);
                    });
                }

                cell.onclick = () => {
                    const newEvent = prompt(`${month+1}월 ${i}일에 추가할 일정을 입력하세요:`);
                    if(newEvent && newEvent.trim()) {
                        if(!events[dateKey]) events[dateKey] = [];
                        events[dateKey].push(newEvent.trim());
                        saveEvents(); renderCalendar();
                    }
                };
                grid.appendChild(cell);
            }
        }

        /* --- 5. Grass Tracker --- */
        function initGrass() {
            let attendance = JSON.parse(localStorage.getItem('attendanceData')) || [];
            if (!attendance.includes(todayStr)) {
                attendance.push(todayStr); localStorage.setItem('attendanceData', JSON.stringify(attendance));
            }
            const grid = document.getElementById('grass-grid'); grid.innerHTML = '';
            for (let i = 29; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const cell = document.createElement('div');
                cell.className = 'grass-cell';
                if (attendance.includes(dateStr)) cell.classList.add('active');
                cell.title = dateStr; grid.appendChild(cell);
            }
        }

        /* --- 6. Mental Care Modal --- */
        const mentalTexts = {
            '피곤함': '피곤해? 그럼 일단 KBS 조져. 그리고 절대 자지마. 너가 꿈을 꿀 때 경쟁자들은 꿈을 이루고있다는걸 명심해. KBS보고 잠 깬 뒤엔 얄짤없이 펜 잡아라.',
            '귀찮음': '귀찮지? 네 경쟁자들은 지금 이 순간에도 문제들을 씹어 먹고 있다. 의치한이 그렇게 만만해 보이냐? 딱 5분만 책 펴놓고 있어 봐라.',
            '무기력함': '처음 반수를 결심했던 그 독기를 기억해라. 남은 시간 동안 결과로 증명하면 이 모든 과정은 전설이 된다. 넌 할 수 있다.'
        };
        function showMentalModal(type) {
            document.getElementById('mental-modal-msg').innerText = mentalTexts[type];
            document.getElementById('mental-modal').classList.add('show');
        }
        function closeMentalModal() { document.getElementById('mental-modal').classList.remove('show'); }

        /* Init */
        window.onload = () => {
            loadImages();
            calculateDDay();
            loadTodos();
            initGrass();
            rotateQuote(); // 처음에 명언 하나 띄우기
            
            setInterval(rotateQuote, 1800000); // 30분(1800000ms)마다 명언 변경
            setInterval(calculateDDay, 3600000); 
        };
    </script>
</body>
</html>
