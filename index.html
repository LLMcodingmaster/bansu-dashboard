<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>반수생 멘탈 관리 대시보드</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: rgba(28, 28, 30, 0.7);
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --accent: #0a84ff;
            --danger: #ff453a;
            --success: #30d158;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0; padding: 20px 40px; background-color: var(--bg-color);
            color: var(--text-main); font-family: var(--font-family);
            display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box; overflow: hidden;
            backdrop-filter: blur(20px); -webkit-font-smoothing: antialiased;
        }

        .panel {
            background: var(--panel-bg); border-radius: 20px; padding: 24px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column;
        }

        /* Header (Goal + Timer + D-Day) */
        .header-container {
            display: flex; justify-content: space-between; align-items: stretch; gap: 20px; margin-bottom: 24px;
        }

        .goal-section { flex: 1.1; display: flex; flex-direction: column; justify-content: center; gap: 16px; padding: 20px; }
        .goal-title {
            font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0;
            line-height: 1.3; word-break: keep-all; min-height: 62px;
            background: linear-gradient(135deg, #fff, #a1a1a6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .univ-images { display: flex; gap: 20px; }
        .univ-box {
            width: 190px; height: 130px; background-color: #2c2c2e; border-radius: 16px;
            display: flex; align-items: flex-end; justify-content: center;
            font-size: 15px; font-weight: 800; color: #ffffff; padding-bottom: 12px;
            box-sizing: border-box; border: 1px dashed rgba(255,255,255,0.4);
            background-size: cover; background-position: center; background-repeat: no-repeat;
            cursor: pointer; transition: transform 0.1s, border 0.2s;
        }
        .univ-box:hover { transform: scale(1.03); border: 1px solid rgba(255,255,255,0.8); }

        /* Timer Section */
        .timer-section { flex: 1.1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .timer-display { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 2px; color: var(--accent); margin-bottom: 8px; text-shadow: 0 0 20px rgba(10, 132, 255, 0.4); }
        .timer-presets { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; align-items: center; }
        .preset-btn { background: #2c2c2e; color: #fff; border: 1px solid #3a3a3c; padding: 6px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .preset-btn:hover { background: #3a3a3c; }
        
        .custom-timer-wrapper { display: flex; align-items: center; gap: 4px; margin-left: 6px; }
        .custom-timer-input { width: 50px; background: #1c1c1e; border: 1px solid #3a3a3c; border-radius: 6px; padding: 5px; color: #fff; font-size: 13px; font-weight: bold; text-align: center; }
        .custom-timer-input:focus { outline: none; border-color: var(--accent); }

        .timer-controls { display: flex; gap: 10px; }
        .ctrl-btn { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
        .ctrl-btn.play { background: rgba(48, 209, 88, 0.2); border-color: var(--success); color: var(--success); }
        .ctrl-btn.stop { background: rgba(255, 69, 58, 0.2); border-color: var(--danger); color: var(--danger); }

        /* D-Day Section */
        .dday-section { display: flex; flex-direction: column; justify-content: center; gap: 12px; padding: 20px; text-align: right; }
        .dday-item { font-size: 28px; font-weight: 700; color: var(--danger); padding: 12px 24px; border-radius: 16px; border: 1px solid rgba(255, 69, 58, 0.3); white-space: nowrap; }
        .dday-item.sub { font-size: 22px; color: #ff9f0a; border: 1px solid rgba(255, 159, 10, 0.3); }

        /* Main Content */
        .main-container { display: flex; flex: 1; gap: 24px; margin-bottom: 24px; overflow: hidden; }

        /* Todo Section */
        .todo-section { flex: 1; overflow-y: auto; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .section-title { font-size: 20px; font-weight: 600; color: var(--text-sub); margin: 0; }
        .header-btns { display: flex; gap: 10px; }
        .action-btn { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .todo-progress { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 16px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; text-align: center; }
        
        .todo-input-group { display: flex; gap: 10px; margin-bottom: 16px; }
        .todo-input { flex: 1; background: #2c2c2e; border: 1px solid #3a3a3c; border-radius: 10px; padding: 12px; color: #fff; font-size: 16px; }
        .add-todo-btn { background: var(--accent); color: #fff; border: none; padding: 0 20px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .todo-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .todo-item { display: flex; align-items: center; background: #1c1c1e; padding: 12px 16px; border-radius: 12px; gap: 12px; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-sub); }
        .todo-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: var(--success); }
        .todo-text { flex: 1; font-size: 17px; font-weight: 500; word-break: break-all; transition: 0.2s; }
        .todo-action-btn { background: none; border: none; color: var(--text-sub); font-size: 14px; cursor: pointer; }

        /* Mental Care */
        .mental-section { width: 280px; display: flex; flex-direction: column; justify-content: flex-end; gap: 16px; }
        .mental-btn { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); padding: 20px; border-radius: 16px; font-size: 22px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .mental-btn:active { transform: scale(0.98); }

        /* Grass Tracker */
        .grass-section { height: 120px; }
        .grass-grid { display: flex; gap: 6px; margin-top: 12px; overflow-x: auto; padding-bottom: 8px; }
        .grass-cell { width: 24px; height: 24px; border-radius: 6px; background-color: #2c2c2e; flex-shrink: 0; }
        .grass-cell.active { background-color: var(--success); box-shadow: 0 0 8px rgba(48, 209, 88, 0.4); }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal-content { background: #1c1c1e; width: 90%; max-width: 820px; padding: 24px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: left; max-height: 85vh; overflow-y: auto; }
        
        .mental-pure-text { font-size: 38px; font-weight: 800; line-height: 1.5; color: #fff; text-align: center; word-break: keep-all; text-shadow: 0 4px 20px rgba(0,0,0,0.5); padding: 20px; }
        .close-btn { width: 100%; padding: 14px; margin-top: 20px; border-radius: 12px; background: #3a3a3c; color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }

        /* 실모 그룹 인풋창 고정 (Flex Wrap 방지) */
        .mock-input-group { display: flex; gap: 8px; margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        .mock-input { background: #2c2c2e; border: 1px solid #3a3a3c; padding: 12px; border-radius: 8px; color: #fff; font-size: 14px; min-width: 0; }
        .mock-add-btn { background: var(--success); color: #fff; border: none; padding: 0 24px; border-radius: 8px; font-weight: 700; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        
        .subject-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .subj-btn { background: #2c2c2e; border: 1px solid #3a3a3c; color: #fff; padding: 20px; border-radius: 12px; font-size: 20px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .subj-btn:hover { background: var(--accent); border-color: var(--accent); }
        .mock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .mock-back-btn { background: none; border: none; color: var(--accent); font-size: 18px; font-weight: 700; cursor: pointer; }
        .mock-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .mock-item { background: rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .mock-info { display: flex; flex-wrap: wrap; gap: 12px; font-size: 16px; font-weight: 600; align-items: center; }
        .mock-info span { color: var(--text-sub); font-size: 14px; }
        .mock-date-tag { font-size: 12px !important; color: #0a84ff !important; background: rgba(10,132,255,0.15); padding: 2px 6px; border-radius: 4px; }
        .mock-actions button { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 14px; margin-left: 10px; }
    </style>
</head>
<body>

    <input type="file" id="image-uploader" accept="image/*" style="display: none;">

    <div class="header-container">
        <div class="goal-section panel">
            <h1 class="goal-title" id="quote-display">고의, 연치, 동의한 27학번</h1>
            <div class="univ-images">
                <div class="univ-box" id="univ-1" onclick="triggerImageUpload('univ-1')">목표 대학 1 +</div>
                <div class="univ-box" id="univ-2" onclick="triggerImageUpload('univ-2')">목표 대학 2 +</div>
            </div>
        </div>

        <div class="timer-section panel">
            <div class="timer-display" id="timer-display">00:00</div>
            <div class="timer-presets">
                <button class="preset-btn" onclick="setTimer(80)">국어 80</button>
                <button class="preset-btn" onclick="setTimer(100)">수학 100</button>
                <button class="preset-btn" onclick="setTimer(70)">영어 70</button>
                <button class="preset-btn" onclick="setTimer(30)">탐구 30</button>
                <div class="custom-timer-wrapper">
                    <input type="number" class="custom-timer-input" id="custom-min" placeholder="분" min="1">
                    <button class="preset-btn" style="background:var(--accent); border:none;" onclick="const m=parseInt(document.getElementById('custom-min').value); if(m>0)setTimer(m);">설정</button>
                </div>
            </div>
            <div class="timer-controls">
                <button class="ctrl-btn play" onclick="startTimer()">▶ 시작</button>
                <button class="ctrl-btn stop" onclick="pauseTimer()">⏸ 정지</button>
                <button class="ctrl-btn" onclick="resetTimer()">↺ 리셋</button>
            </div>
        </div>

        <div class="dday-section panel">
            <div class="dday-item" id="dday-suneung">수능 D-??</div>
            <div class="dday-item sub" id="dday-9">9평 D-??</div>
        </div>
    </div>

    <div class="main-container">
        <div class="todo-section panel">
            <div class="section-header">
                <h2 class="section-title">오늘의 미션</h2>
                <div class="header-btns">
                    <button class="action-btn" onclick="openMockModal()">📊 실모 기록</button>
                    <button class="action-btn" onclick="openCalendar()">📅 달력 보기</button>
                </div>
            </div>
            
            <div class="todo-progress" id="todo-progress-text">의치한까지 0%</div>
            <div class="todo-input-group">
                <input type="text" class="todo-input" id="new-todo" placeholder="오늘 반드시 끝낼 일을 입력하세요" onkeypress="if(event.key==='Enter') addTodo()">
                <button class="add-todo-btn" onclick="addTodo()">추가</button>
            </div>
            <ul class="todo-list" id="todo-list"></ul>
        </div>

        <div class="mental-section panel">
            <h2 class="section-title" style="text-align: center;">긴급 멘탈 케어</h2>
            <button class="mental-btn" onclick="showMentalModal('피곤함')">피곤함 😵‍💫</button>
            <button class="mental-btn" onclick="showMentalModal('귀찮음')">귀찮음 🥱</button>
            <button class="mental-btn" onclick="showMentalModal('무기력함')">무기력함 🫠</button>
        </div>
    </div>

    <div class="grass-section panel">
        <h2 class="section-title">최근 30일 출석 기록</h2>
        <div class="grass-grid" id="grass-grid"></div>
    </div>

    <div class="modal-overlay" id="mental-modal" onclick="closeMentalModal()">
        <div style="width: 85%; max-width: 850px; text-align: center;">
            <div class="mental-pure-text" id="mental-modal-msg"></div>
        </div>
    </div>

    <div class="modal-overlay" id="calendar-modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="changeMonth(-1)">◀</button>
                <div style="font-size: 24px; font-weight: 700; color: #fff;" id="cal-title"></div>
                <button style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;" onclick="changeMonth(1)">▶</button>
            </div>
            <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px;" id="cal-grid"></div>
            <button class="close-btn" onclick="closeCalendar()">닫기</button>
        </div>
    </div>

    <div class="modal-overlay" id="mock-modal">
        <div class="modal-content" id="mock-main-view">
            <h2 style="margin-top:0; color:#fff; text-align:center;">실모 기록장</h2>
            <p style="text-align:center; color:var(--text-sub);">기록할 과목을 선택하세요.</p>
            <div class="subject-grid">
                <button class="subj-btn" onclick="openSubjectMock('국어')">국어</button>
                <button class="subj-btn" onclick="openSubjectMock('수학')">수학</button>
                <button class="subj-btn" onclick="openSubjectMock('영어')">영어</button>
                <button class="subj-btn" onclick="openSubjectMock('사회문화')">사회문화</button>
                <button class="subj-btn" onclick="openSubjectMock('경제')">경제</button>
            </div>
            <button class="close-btn" onclick="closeMockModal()">닫기</button>
        </div>

        <div class="modal-content" id="mock-detail-view" style="display: none;">
            <div class="mock-header">
                <button class="mock-back-btn" onclick="backToMockMain()">◀ 과목 선택</button>
                <h2 style="margin:0; color:#fff;" id="mock-subject-title">국어</h2>
                <div style="width: 80px;"></div> 
            </div>
            
            <div class="mock-input-group">
                <input type="text" class="mock-input" id="mock-name" placeholder="모의고사명 (예: 이감)" style="flex: 2;">
                <input type="text" class="mock-input" id="mock-year" placeholder="연도" style="flex: 0.8;">
                <input type="text" class="mock-input" id="mock-session" placeholder="회차 (숫자만)" style="flex: 1;">
                <input type="text" class="mock-input" id="mock-score" placeholder="점수" style="flex: 0.8;">
                <button class="mock-add-btn" onclick="addMockRecord()">추가</button>
            </div>

            <ul class="mock-list" id="mock-list-container"></ul>
            <button class="close-btn" onclick="closeMockModal()">닫기</button>
        </div>
    </div>

    <script>
        /* --- Quotes (100개) --- */
        const quotes = [
            "네가 자는 동안 누군가는 꿈을 이루고 있다.", "서울대라는 타이틀에 안주하지 않고 메디컬을 향해 던진 승부수, 결과로 증명해라.",
            "고통은 순간이지만, 포기는 영원히 남는다.", "기적은 노력의 또 다른 이름이다.", "최선을 다했다는 변명은 결과 앞에서 무의미하다.",
            "지금 땀을 흘리지 않으면 나중에 눈물을 흘려야 한다.", "오늘 걷지 않으면 내일은 뛰어야 한다.", "불안하면 공부해라. 불안함은 지식이 부족할 때 찾아온다.",
            "재능은 한계를 만들지만, 노력은 기적을 만든다.", "포기하고 싶은 그 순간이 진짜 승부처다.", "메디컬은 운이 아니라 독기다.",
            "시작은 반이 아니다. 끝까지 해야 끝이다.", "성공은 가장 절박한 자의 몫이다.", "오늘의 유혹을 참으면, 내일의 인생이 바뀐다.",
            "핑계를 찾는 대신 방법을 찾아라.", "기하의 본질은 직관과 논리다. 핑계 대지 말고 뚫어내라.", "지금 이 순간에도 네 경쟁자는 페이지를 넘기고 있다.",
            "나를 죽이지 못하는 고통은 나를 더 강하게 만든다.", "할 수 있다고 믿든, 할 수 없다고 믿든, 네가 믿는 대로 된다.", "네 한계는 네가 정하는 것이다. 선을 그어버리지 마라.",
            "의치한 27학번, 내 자리는 이미 정해져 있다.", "가장 어두운 밤이 지나야 가장 눈부신 새벽이 온다.", "지금의 고생은 훗날 네가 입을 가운의 무게다.",
            "타협하는 순간, 평범해진다.", "승리는 1%의 재능 and 99%의 끈기다.", "네 인생을 바꿀 수 있는 사람은 오직 너뿐이다.",
            "나중에 후회할 일은 지금 만들지 마라.", "펜을 잡는 순간 모든 잡념을 버려라.", "남들과 똑같이 해서는 남들과 다를 수 없다.",
            "목표가 확실한 사람은 흔들리지 않는다.", "성적은 투자한 시간에 비례한다. 배신하지 않는다.", "네가 버린 1분이 모여 네 대학 간판을 바꾼다.",
            "성공으로 가는 엘리베이터는 고장 났다. 계단으로 올라가라.", "힘들 때 쉬는 건 하수다. 힘들 때 견디는 게 고수다.", "스마트폰을 내려놓는 순간, 너의 점수가 올라간다.",
            "과정은 고통스럽지만 결과는 달콤하다.", "오늘 하루를 완벽하게 통제해라. 그러면 인생이 통제된다.", "운명은 우연이 아니라 선택이다.",
            "가장 위대한 승리는 나 자신을 이기는 것이다.", "기출은 거짓말을 하지 않는다.", "아무것도 하지 않으면 아무 일도 일어나지 않는다.",
            "네가 할 수 있는 최선보다 항상 한 발짝 더 가라.", "최고의 자리를 박차고 나온 그 독기를 끝까지 밀어붙여라.", "성공한 사람들의 공통점은 포기를 모른다는 것이다.",
            "너의 경쟁자는 어제의 너다.", "눈물로 씨를 뿌리는 자는 기쁨으로 거두리라.", "피할 수 없다면, 압도해라.",
            "가장 무서운 적은 나의 나태함이다.", "하루하루를 인생의 마지막 날처럼 치열하게 살아라.", "지금 편하면 나중에 불편해진다.",

        function rotateQuote() {
            const qd = document.getElementById('quote-display');
            qd.style.opacity = 0; 
            setTimeout(() => { qd.innerText = quotes[Math.floor(Math.random() * quotes.length)]; qd.style.opacity = 1; }, 300);

        /* --- 1. Image Upload (2개 고정) --- */
        let currentUploadTarget = null;
        function triggerImageUpload(boxId) { currentUploadTarget = boxId; document.getElementById('image-uploader').click(); }
        document.getElementById('image-uploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const box = document.getElementById(currentUploadTarget);
                box.style.backgroundImage = `url(${event.target.result})`;
                box.innerText = ""; box.style.border = "none";
                localStorage.setItem('img_' + currentUploadTarget, event.target.result);
            };
            reader.readAsDataURL(file);
        });
        function loadImages() {
            ['univ-1', 'univ-2'].forEach(id => {
                const savedImage = localStorage.getItem('img_' + id);
                if (savedImage) {
                    const box = document.getElementById(id);
                    box.style.backgroundImage = `url(${savedImage})`;
                    box.innerText = ""; box.style.border = "none";
                }
            });
        }

        /* --- 2. Timer Logic --- */
        let timerInterval;
        let timeRemaining = 0;
        function updateTimerDisplay() {
            const min = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
            const sec = String(timeRemaining % 60).padStart(2, '0');
            document.getElementById('timer-display').innerText = `${min}:${sec}`;
        }
        function setTimer(minutes) {
            clearInterval(timerInterval);
            timeRemaining = minutes * 60;
            updateTimerDisplay();
        }
        function startTimer() {
            if(timeRemaining <= 0) return;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--; updateTimerDisplay();
                if(timeRemaining <= 0) { clearInterval(timerInterval); alert("⏰ 시험 시간이 종료되었습니다! 펜을 놓으세요."); }
            }, 1000);
        }
        function pauseTimer() { clearInterval(timerInterval); }
        function resetTimer() { clearInterval(timerInterval); timeRemaining = 0; updateTimerDisplay(); }

        let currentSubject = '';

        function openMockModal() { document.getElementById('mock-modal').classList.add('show'); backToMockMain(); }
        function closeMockModal() { document.getElementById('mock-modal').classList.remove('show'); }
        function backToMockMain() { document.getElementById('mock-detail-view').style.display = 'none'; document.getElementById('mock-main-view').style.display = 'block'; }
        
        function openSubjectMock(subj) {
            currentSubject = subj;
            document.getElementById('mock-subject-title').innerText = subj;
            document.getElementById('mock-main-view').style.display = 'none';
            document.getElementById('mock-detail-view').style.display = 'block';
            renderMockList();
        }

        function renderMockList() {
            const list = document.getElementById('mock-list-container');
            list.innerHTML = '';
            if(!mockData[currentSubject]) mockData[currentSubject] = [];

            mockData[currentSubject].forEach((record, index) => {
                const li = document.createElement('li');
                li.className = 'mock-item';
                li.innerHTML = `
                    <div class="mock-info">
                        <strong>${record.name}</strong>
                        <span>${record.year ? record.year+'년' : ''}</span>
                        <span style="color:#ff9f0a;">${record.session}</span>
                        <span style="color:var(--success); font-weight:800;">${record.score ? record.score+'점' : '점수미기입'}</span>
                        <span class="mock-date-tag">${record.date || ''}</span>
                    </div>
                    <div class="mock-actions">
                        <button onclick="editMockRecord(${index})">수정</button>
                        <button onclick="deleteMockRecord(${index})">삭제</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function addMockRecord() {
            const name = document.getElementById('mock-name').value.trim();
            const year = document.getElementById('mock-year').value.trim();
            let session = document.getElementById('mock-session').value.trim();
            const score = document.getElementById('mock-score').value.trim();

            if(!name || !session) { alert("모의고사명과 회차는 필수입니다."); return; }

            // 회차 뒤에 자동으로 '회' 붙이기 포맷 규칙
            if(!session.endsWith('회') && !isNaN(session)) { session = session + '회'; }

            // 현재 날짜 및 시간 데이터 생성
            const now = new Date();
            const dateStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            mockData[currentSubject].push({ name, year, session, score, date: dateStr });
            localStorage.setItem('mockRecords', JSON.stringify(mockData));
            
            document.getElementById('mock-name').value = '';
            document.getElementById('mock-session').value = '';
            document.getElementById('mock-score').value = '';
            renderMockList();
        }

        function deleteMockRecord(index) {
            if(confirm("이 기록을 삭제할까요?")) { mockData[currentSubject].splice(index, 1); localStorage.setItem('mockRecords', JSON.stringify(mockData)); renderMockList(); }
        }

        function editMockRecord(index) {
            const r = mockData[currentSubject][index];
            const newScore = prompt("수정할 점수를 입력하세요:", r.score);
            if(newScore !== null) { mockData[currentSubject][index].score = newScore.trim(); localStorage.setItem('mockRecords', JSON.stringify(mockData)); renderMockList(); }
        }

        function showMentalModal(type) {
            const arr = mentalTexts[type];
            const randomMsg = arr[Math.floor(Math.random() * arr.length)]; // 30개 중 랜덤 추출
            document.getElementById('mental-modal-msg').innerText = randomMsg;
            document.getElementById('mental-modal').classList.add('show');
        }
        function closeMentalModal() { document.getElementById('mental-modal').classList.remove('show'); }

        /* --- D-Day Calculator --- */
        function calculateDDay() {
            const today = new Date(); today.setHours(0,0,0,0);
            const suneung = new Date('2026-11-19T00:00:00');
            const sepMock = new Date('2026-09-02T00:00:00');
            document.getElementById('dday-suneung').innerText = `수능 D-${Math.ceil((suneung - today) / 86400000)}`;
            document.getElementById('dday-9').innerText = `9평 D-${Math.ceil((sepMock - today) / 86400000)}`;
        }

        /* --- Todo List Logic --- */
        let todos = []; const todayStr = new Date().toISOString().split('T')[0];
        function loadTodos() { todos = JSON.parse(localStorage.getItem('todos_' + todayStr)) || []; renderTodos(); }
        function saveTodos() { localStorage.setItem('todos_' + todayStr, JSON.stringify(todos)); renderTodos(); }
        function renderTodos() {
            const list = document.getElementById('todo-list'); list.innerHTML = ''; let completedCount = 0;
            todos.forEach((todo, idx) => {
                if(todo.completed) completedCount++;
                list.innerHTML += `<li class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${idx})">
                    <span class="todo-text">${todo.text}</span>
                    <button class="todo-action-btn" onclick="deleteTodo(${idx})">삭제</button>
                </li>`;
            });
            const progressEl = document.getElementById('todo-progress-text');
            if(todos.length === 0) { progressEl.innerText = "오늘 할 일을 추가해라."; progressEl.style.color = "#8e8e93"; }
            else {
                const p = Math.round((completedCount / todos.length) * 100);
                progressEl.innerText = p === 100 ? "의치한까지 100% - 내일도 존나 열심히 달려보자🔥" : `의치한까지 ${p}%`;
                progressEl.style.color = p === 100 ? "var(--success)" : "#fff";
            }
        }
        function addTodo() { const input = document.getElementById('new-todo'); const text = input.value.trim(); if(text) { todos.push({ text: text, completed: false }); input.value = ''; saveTodos(); } }
        function toggleTodo(index) { todos[index].completed = !todos[index].completed; saveTodos(); }
        function deleteTodo(index) { if(confirm('삭제하시겠습니까?')) { todos.splice(index, 1); saveTodos(); } }

        /* --- Calendar Modal --- */
        let calDate = new Date(); let events = JSON.parse(localStorage.getItem('calEvents')) || {};
        function saveEvents() { localStorage.setItem('calEvents', JSON.stringify(events)); }
        function openCalendar() { document.getElementById('calendar-modal').classList.add('show'); renderCalendar(); }
        function closeCalendar() { document.getElementById('calendar-modal').classList.remove('show'); }
        function changeMonth(dir) { calDate.setMonth(calDate.getMonth() + dir); renderCalendar(); }
        function renderCalendar() {
            const year = calDate.getFullYear(); const month = calDate.getMonth();
            document.getElementById('cal-title').innerText = `${year}년 ${month + 1}월`;
            const grid = document.getElementById('cal-grid'); grid.innerHTML = '';
            const firstDay = new Date(year, month, 1).getDay(); const lastDate = new Date(year, month + 1, 0).getDate();
            ['일', '월', '화', '수', '목', '금', '토'].forEach(d => grid.innerHTML += `<div style="text-align:center; color:var(--text-sub); margin-bottom:8px; font-weight:bold;">${d}</div>`);
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div></div>`;
            for(let i=1; i<=lastDate; i++) {
                const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let eventHtml = (events[dateKey]||[]).map((ev,idx) => `<div style="font-size:11px; background:var(--accent); color:#fff; padding:2px; margin-top:2px; border-radius:4px;" onclick="event.stopPropagation(); deleteCalEvent('${dateKey}', ${idx})">${ev}</div>`).join('');
                grid.innerHTML += `<div style="background:#2c2c2e; border-radius:8px; min-height:60px; padding:6px; cursor:pointer;" onclick="addCalEvent('${dateKey}')"><div style="font-weight:bold; color:#fff;">${i}</div>${eventHtml}</div>`;
            }
        }
        function addCalEvent(dateKey) { const ev = prompt("일정 입력:"); if(ev) { if(!events[dateKey]) events[dateKey] = []; events[dateKey].push(ev); saveEvents(); renderCalendar(); } }
        function deleteCalEvent(dateKey, idx) { if(confirm("삭제?")) { events[dateKey].splice(idx, 1); saveEvents(); renderCalendar(); } }

        /* --- Grass Tracker --- */
        function initGrass() {
            let att = JSON.parse(localStorage.getItem('attendanceData')) || [];
            if (!att.includes(todayStr)) { att.push(todayStr); localStorage.setItem('attendanceData', JSON.stringify(att)); }
            const grid = document.getElementById('grass-grid'); grid.innerHTML = '';
            for (let i = 29; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i); const ds = d.toISOString().split('T')[0];
                grid.innerHTML += `<div class="grass-cell ${att.includes(ds) ? 'active' : ''}" title="${ds}"></div>`;
            }
        }

        window.onload = () => { loadImages(); calculateDDay(); loadTodos(); initGrass(); rotateQuote(); setInterval(rotateQuote, 1800000); setInterval(calculateDDay, 3600000); };
    </script>
